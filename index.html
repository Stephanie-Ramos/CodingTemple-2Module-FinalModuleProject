<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="designing a webpage using a personal portfolio template" />
    <meta name="author" content="Stephanie Ramos" />
    <title>Final Module Project</title>
    <link rel="stylesheet" href="style.css" class="stylesheet" />
  </head>

    <body>
        <!-- Header Section -->
        <header class="navbar">
            <div class="nav-container">
                <!-- Middle Section -->
                <nav class="navlinks">
                    <ul>
                        <li><a href="#">Home</a></li>
                        <li><a href="#">Case Studies</a></li>
                        <li><a href="#">Testimonials</a></li>
                        <li><a href="#">Recent work</a></li>
                        <li><a href="#">Get In Touch</a></li>
                    </ul>
                </nav> 
                <!-- Right Section -->
                <div class="social-icons">
                    <img src="/FinalModuleProject/img/LinkedIn.svg" alt="LinkedIn logo">
                    <img src="/FinalModuleProject/img/Behance.svg" alt="Behance logo">
                    <img src="/FinalModuleProject/img/Twitter.svg" alt="Twitter logo">
                </div>  
            </div>
        </header>

    <main>
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-text">
                <h1>Your Name Here</h1>
                <p>Intro text: Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
        
                <button class="button">
                    Let's get started >
                </button>            
            </div>

            <div class="hero-image">
                <img src="/FinalModuleProject/img/profilePhoto.png" alt="profile image" >
            </div>
        </section>

        <section class="worked-with">
            <p>Worked with</p>
            <div class="logos">
                <img src="/FinalModuleProject/img/ClickUp.svg" alt="ClickUp logo">
                <img src="/FinalModuleProject/img/Dropbox.svg" alt="Dropbox logo">
                <img src="/FinalModuleProject/img/Paychex.svg" alt="Paychex logo">
                <img src="/FinalModuleProject/img/Elastic.svg" alt="Elastic logo">
                <img src="/FinalModuleProject/img/Stripe.svg" alt="Stripe logo">
            </div>
        </section>
    </main>
  </body>
